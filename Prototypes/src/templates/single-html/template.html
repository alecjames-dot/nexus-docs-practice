<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nexus Prototype</title>

    <!-- TailwindCSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {},
        },
      };
    </script>

    <!-- React + ReactDOM (UMD builds for CDN use) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <!-- Babel standalone for JSX transpilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
      body {
        background-color: #020617; /* slate-950 */
        margin: 0;
        padding: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI',
          Roboto, 'Helvetica Neue', Arial, 'Noto Sans', sans-serif;
      }
    </style>
  </head>
  <body class="bg-slate-950 min-h-screen">
    <div id="root"></div>

    <!-- ═══════════════════════════════════════════════════════════════════════
         GENERATED PROTOTYPE CODE
         The content below is replaced by prototype-generator output.
         All components are defined inline using Babel JSX transpilation.
    ════════════════════════════════════════════════════════════════════════ -->
    <script type="text/babel">
      const { useState, useEffect, useCallback, useRef } = React;

      // ── GENERATED CONTENT STARTS HERE ─────────────────────────────────────
      // prototype-generator will replace this section with generated components

      function App() {
        return (
          <div className="min-h-screen bg-slate-950 flex items-center justify-center">
            <p className="text-slate-400 font-mono text-sm">
              Prototype not yet generated. Run prototype-gen to generate content.
            </p>
          </div>
        );
      }

      // ── GENERATED CONTENT ENDS HERE ───────────────────────────────────────

      const rootElement = document.getElementById('root');
      const root = ReactDOM.createRoot(rootElement);
      root.render(<App />);
    </script>
  </body>
</html>
