<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexusOS — Stealth Stablecoin Protocol Simulator</title>
<style>
  :root {
    --bg: #0A0A1A; --surface: #0F0F20; --surface2: #1A1A2E; --surface3: #2A2A3E;
    --text: #E0E0F0; --text2: #888; --text3: #555; --text4: #333;
    --accent: #E94560; --green: #16C79A; --purple: #6C5CE7; --amber: #F39C12; --blue: #3498DB;
    --green-bg: rgba(22,199,154,0.08); --green-border: rgba(22,199,154,0.25);
    --purple-bg: rgba(108,92,231,0.08); --purple-border: rgba(108,92,231,0.25);
    --accent-bg: rgba(233,69,96,0.08); --accent-border: rgba(233,69,96,0.25);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: system-ui,-apple-system,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
  .mono { font-family: 'SF Mono','Fira Code',Consolas,monospace; }
  .app { display:flex; min-height:100vh; }

  /* Sidebar */
  .sidebar { width:220px; background:var(--surface); border-right:1px solid var(--surface2); padding:20px 16px; display:flex; flex-direction:column; gap:8px; flex-shrink:0; }
  .sidebar-brand { font-size:11px; letter-spacing:4px; color:var(--accent); text-transform:uppercase; margin-bottom:16px; }
  .sidebar-id { font-size:16px; font-weight:700; color:var(--text); margin-bottom:4px; }
  .sidebar-badge { display:inline-flex; align-items:center; gap:4px; font-size:9px; padding:3px 8px; background:var(--green-bg); border:1px solid var(--green-border); color:var(--green); margin-bottom:16px; }
  .sidebar-balance-label { font-size:9px; color:var(--text3); text-transform:uppercase; letter-spacing:1.5px; margin-bottom:4px; }
  .sidebar-balance { font-size:22px; font-weight:700; color:var(--text); margin-bottom:2px; }
  .sidebar-balance-sub { font-size:9px; color:var(--text4); margin-bottom:20px; }
  .sidebar-nav { display:flex; flex-direction:column; gap:2px; }
  .nav-btn { background:none; border:none; color:var(--text3); font-size:12px; padding:8px 10px; text-align:left; cursor:pointer; border-radius:4px; font-family:inherit; transition:all 0.15s; }
  .nav-btn:hover { background:var(--surface2); color:var(--text2); }
  .nav-btn.active { background:var(--accent-bg); color:var(--accent); border:1px solid var(--accent-border); }
  .sidebar-switch { margin-top:auto; padding-top:16px; border-top:1px solid var(--surface2); }
  .switch-btn { width:100%; background:var(--surface2); border:1px solid var(--surface3); color:var(--text2); font-size:10px; padding:8px; cursor:pointer; font-family:inherit; transition:all 0.15s; }
  .switch-btn:hover { border-color:var(--purple); color:var(--purple); }

  /* Main */
  .main { flex:1; padding:28px 32px; max-width:820px; overflow-y:auto; }
  .page-title { font-size:20px; font-weight:700; margin-bottom:4px; }
  .page-sub { font-size:11px; color:var(--text3); margin-bottom:24px; }
  .section-label { font-size:9px; letter-spacing:1.5px; color:var(--text3); text-transform:uppercase; margin-bottom:12px; }

  /* Cards */
  .card { background:var(--surface); border:1px solid var(--surface2); padding:16px; margin-bottom:12px; transition:border-color 0.2s; }
  .card-header { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:8px; }
  .card-title { font-size:13px; font-weight:600; }
  .card-desc { font-size:11px; color:var(--text2); line-height:1.5; }

  /* Badge */
  .badge { display:inline-flex; align-items:center; gap:4px; font-size:9px; padding:3px 8px; font-weight:600; }
  .badge-green { background:var(--green-bg); border:1px solid var(--green-border); color:var(--green); }
  .badge-purple { background:var(--purple-bg); border:1px solid var(--purple-border); color:var(--purple); }
  .badge-accent { background:var(--accent-bg); border:1px solid var(--accent-border); color:var(--accent); }
  .badge-amber { background:rgba(243,156,18,0.08); border:1px solid rgba(243,156,18,0.25); color:var(--amber); }

  /* Tx list */
  .tx-row { display:flex; align-items:center; gap:12px; padding:10px 14px; background:var(--surface); border:1px solid var(--surface2); margin-bottom:4px; cursor:pointer; transition:border-color 0.15s; }
  .tx-row:hover { border-color:var(--surface3); }
  .tx-dir { width:28px; height:28px; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; flex-shrink:0; }
  .tx-dir.sent { background:var(--accent-bg); color:var(--accent); }
  .tx-dir.recv { background:var(--green-bg); color:var(--green); }
  .tx-info { flex:1; }
  .tx-party { font-size:12px; font-weight:600; }
  .tx-time { font-size:9px; color:var(--text4); }
  .tx-amount { font-size:13px; font-weight:600; text-align:right; }
  .tx-amount.sent { color:var(--accent); }
  .tx-amount.recv { color:var(--green); }

  /* Steps */
  .step-container { position:relative; }
  .step { display:flex; gap:14px; margin-bottom:16px; }
  .step-indicator { display:flex; flex-direction:column; align-items:center; width:32px; flex-shrink:0; }
  .step-dot { width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; flex-shrink:0; }
  .step-dot.pending { background:var(--surface2); color:var(--text3); border:1px solid var(--surface3); }
  .step-dot.active { background:var(--accent); color:#fff; }
  .step-dot.done { background:var(--green); color:#fff; }
  .step-line { width:1px; flex:1; background:var(--surface3); min-height:8px; }
  .step-content { flex:1; padding-bottom:8px; }
  .step-title { font-size:12px; font-weight:600; margin-bottom:4px; }
  .step-desc { font-size:11px; color:var(--text2); line-height:1.5; }

  /* Under the hood */
  .hood { margin-top:6px; padding:6px 10px; background:var(--bg); border:1px solid var(--surface2); font-size:9px; }
  .hood-label { color:var(--accent); font-weight:600; margin-right:4px; }
  .hood-text { color:var(--text3); }

  /* Input */
  .input-group { margin-bottom:14px; }
  .input-label { font-size:9px; color:var(--text3); text-transform:uppercase; letter-spacing:1px; margin-bottom:6px; }
  .input-field { width:100%; padding:10px 12px; background:var(--surface2); border:1px solid var(--surface3); color:var(--text); font-size:14px; font-family:inherit; outline:none; transition:border-color 0.15s; }
  .input-field:focus { border-color:var(--purple); }
  .input-field::placeholder { color:var(--text4); }

  /* Buttons */
  .btn { padding:10px 20px; font-size:12px; font-weight:600; border:none; cursor:pointer; font-family:inherit; transition:all 0.15s; text-align:center; width:100%; }
  .btn-accent { background:var(--accent-bg); border:1px solid var(--accent-border); color:var(--accent); }
  .btn-accent:hover { background:rgba(233,69,96,0.15); }
  .btn-green { background:var(--green-bg); border:1px solid var(--green-border); color:var(--green); }
  .btn-green:hover { background:rgba(22,199,154,0.15); }
  .btn-purple { background:var(--purple-bg); border:1px solid var(--purple-border); color:var(--purple); }
  .btn-purple:hover { background:rgba(108,92,231,0.15); }
  .btn-outline { background:transparent; border:1px solid var(--surface3); color:var(--text2); }
  .btn-outline:hover { border-color:var(--text3); color:var(--text); }
  .btn:disabled { opacity:0.4; cursor:not-allowed; }

  /* Progress */
  .progress-bar { height:3px; background:var(--surface2); border-radius:2px; overflow:hidden; margin:8px 0; }
  .progress-fill { height:100%; background:var(--green); border-radius:2px; transition:width 0.3s ease; }

  /* Proof card */
  .proof-card { background:var(--bg); border:1px solid var(--surface2); padding:14px; margin:8px 0; }
  .proof-row { display:flex; justify-content:space-between; align-items:baseline; padding:4px 0; font-size:10px; }
  .proof-key { color:var(--text3); }
  .proof-val { color:var(--text2); }

  /* Checklist */
  .check-item { display:flex; gap:8px; padding:6px 0; font-size:11px; }
  .check-icon { flex-shrink:0; }

  /* Callout */
  .callout { padding:12px 14px; margin:12px 0; border-left:3px solid; }
  .callout-green { background:var(--green-bg); border-color:var(--green); }
  .callout-amber { background:rgba(243,156,18,0.06); border-color:var(--amber); }
  .callout-accent { background:var(--accent-bg); border-color:var(--accent); }
  .callout-title { font-size:11px; font-weight:600; margin-bottom:3px; }
  .callout-text { font-size:10px; color:var(--text2); line-height:1.5; }

  /* Verification anim */
  .verify-step { display:flex; gap:10px; align-items:flex-start; padding:8px 0; font-size:11px; }
  .verify-icon { width:18px; height:18px; display:flex; align-items:center; justify-content:center; font-size:10px; flex-shrink:0; }
  .verify-pending .verify-icon { color:var(--text4); }
  .verify-running .verify-icon { color:var(--amber); }
  .verify-done .verify-icon { color:var(--green); }
  .verify-fail .verify-icon { color:var(--accent); }
  .verify-text { color:var(--text2); }
  .verify-running .verify-text { color:var(--text); }

  /* Fade in */
  @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  .fade-in { animation: fadeIn 0.3s ease forwards; }

  /* Mobile */
  @media (max-width:768px) {
    .sidebar { display:none; }
    .main { padding:16px; }
  }

  /* Pulse */
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
  .pulse { animation: pulse 1.5s ease infinite; }
</style>
</head>
<body>
<!-- PROTOTYPE NOTE: Designed for sender verification by zkKYC, not receiver verification. More cycles to do on this. -->
<div style="background:#2A1A00;border-bottom:1px solid #F39C12;padding:8px 20px;font-size:11px;color:#F39C12;font-family:system-ui,-apple-system,sans-serif;">
  <strong>Prototype Note:</strong> Designed for sender verification by zkKYC, not receiver verification. More cycles to do on this.
</div>
<div class="app" id="app"></div>
<script>
// ── Mock Data ──
const hex = (n) => Array.from({length:n},()=>Math.floor(Math.random()*16).toString(16)).join('');
const mockAddr = () => '0x' + hex(40);
const mockHash = () => '0x' + hex(64);
const truncAddr = (a) => a.slice(0,6) + '...' + a.slice(-4);
const usdFmt = (n) => '$' + n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const timeFmt = (d) => { const m=Math.floor((Date.now()-d)/60000); return m<1?'just now':m<60?m+'m ago':Math.floor(m/60)+'h ago'; };

const PERSONAS = {
  alice: { id:'alice.nexus', balance:12450.00, stealthCount:14 },
  bob: { id:'bob.nexus', balance:8230.50, stealthCount:9 },
};
const CONTACTS = ['bob.nexus','carol.nexus','dave.nexus','eve.nexus'];

let currentPersona = 'alice';
let persona = () => PERSONAS[currentPersona];

// Generate seed transactions
const seedTxs = [
  { id:mockHash(), from:'alice.nexus', to:'bob.nexus', amount:500, ts:Date.now()-120000, stealthAddr:mockAddr(), proofHash:mockHash(), commitHash:mockHash(), block:1847293, gas:487231 },
  { id:mockHash(), from:'carol.nexus', to:'alice.nexus', amount:1200, ts:Date.now()-3600000, stealthAddr:mockAddr(), proofHash:mockHash(), commitHash:mockHash(), block:1847105, gas:452108 },
  { id:mockHash(), from:'alice.nexus', to:'dave.nexus', amount:75.50, ts:Date.now()-7200000, stealthAddr:mockAddr(), proofHash:mockHash(), commitHash:mockHash(), block:1846998, gas:461543 },
  { id:mockHash(), from:'eve.nexus', to:'alice.nexus', amount:3000, ts:Date.now()-18000000, stealthAddr:mockAddr(), proofHash:mockHash(), commitHash:mockHash(), block:1846501, gas:478922 },
  { id:mockHash(), from:'bob.nexus', to:'alice.nexus', amount:250, ts:Date.now()-43200000, stealthAddr:mockAddr(), proofHash:mockHash(), commitHash:mockHash(), block:1845872, gas:469117 },
  { id:mockHash(), from:'alice.nexus', to:'eve.nexus', amount:890, ts:Date.now()-86400000, stealthAddr:mockAddr(), proofHash:mockHash(), commitHash:mockHash(), block:1844990, gas:455890 },
  { id:mockHash(), from:'dave.nexus', to:'bob.nexus', amount:425, ts:Date.now()-100000000, stealthAddr:mockAddr(), proofHash:mockHash(), commitHash:mockHash(), block:1844221, gas:443998 },
  { id:mockHash(), from:'carol.nexus', to:'bob.nexus', amount:1800, ts:Date.now()-150000000, stealthAddr:mockAddr(), proofHash:mockHash(), commitHash:mockHash(), block:1843100, gas:491003 },
];

function myTxs() {
  const me = persona().id;
  return seedTxs.filter(t => t.from === me || t.to === me).sort((a,b) => b.ts - a.ts);
}

// ── State ──
let view = 'dashboard';
let sendStep = 0;
let sendData = { to:'', amount:'' };
let recvStep = 0;
let verifyTx = null;
let verifyStep = -1;
let verifyInvalid = false;

// ── Render Engine ──
function render() {
  const app = document.getElementById('app');
  app.innerHTML = renderSidebar() + '<div class="main">' + renderView() + '</div>';
  bindEvents();
}

function renderSidebar() {
  const p = persona();
  const other = currentPersona === 'alice' ? 'bob' : 'alice';
  return `<div class="sidebar">
    <div class="sidebar-brand">NexusOS</div>
    <div class="sidebar-id">${p.id}</div>
    <div class="sidebar-badge">\u2713 zkKYC Verified</div>
    <div class="sidebar-balance-label">USDX Balance</div>
    <div class="sidebar-balance">${usdFmt(p.balance)}</div>
    <div class="sidebar-balance-sub">across ${p.stealthCount} stealth addresses</div>
    <div class="sidebar-nav">
      <button class="nav-btn ${view==='dashboard'?'active':''}" data-view="dashboard">\u25A0 Dashboard</button>
      <button class="nav-btn ${view==='send'?'active':''}" data-view="send">\u2197 Send USDX</button>
      <button class="nav-btn ${view==='receive'?'active':''}" data-view="receive">\u2199 Receive USDX</button>
      <button class="nav-btn ${view==='verify'?'active':''}" data-view="verify">\u2714 Verify Transfer</button>
    </div>
    <div class="sidebar-switch">
      <button class="switch-btn" data-action="switch">Switch to ${PERSONAS[other].id}</button>
    </div>
  </div>`;
}

function renderView() {
  switch(view) {
    case 'dashboard': return renderDashboard();
    case 'send': return renderSend();
    case 'receive': return renderReceive();
    case 'verify': return renderVerify();
  }
}

// ── Dashboard ──
function renderDashboard() {
  const txs = myTxs();
  const me = persona().id;
  return `<div class="fade-in">
    <div class="page-title">Dashboard</div>
    <div class="page-sub">Private stablecoin activity on Nexus</div>
    <div class="section-label">Recent Transfers</div>
    ${txs.map(tx => {
      const sent = tx.from === me;
      return `<div class="tx-row" data-action="view-tx" data-txid="${tx.id}">
        <div class="tx-dir ${sent?'sent':'recv'}">${sent?'\u2197':'\u2199'}</div>
        <div class="tx-info">
          <div class="tx-party">${sent?'To '+tx.to:'From '+tx.from}</div>
          <div class="tx-time">${timeFmt(tx.ts)}</div>
        </div>
        <div class="badge badge-green" style="margin-right:8px">\u2713 Verified</div>
        <div class="tx-amount ${sent?'sent':'recv'}">${sent?'-':'+'}${usdFmt(tx.amount)} USDX</div>
      </div>`;
    }).join('')}
  </div>`;
}

// ── Send ──
function renderSend() {
  const steps = ['Recipient','Amount','ZK Proof','Confirm'];
  return `<div class="fade-in">
    <div class="page-title">Send USDX</div>
    <div class="page-sub">Private stealth transfer with ZK compliance</div>
    <div style="display:flex;gap:4px;margin-bottom:24px;">
      ${steps.map((s,i) => `<div style="flex:1;text-align:center;">
        <div style="height:3px;background:${i<=sendStep?'var(--accent)':'var(--surface2)'};margin-bottom:6px;border-radius:2px;transition:background 0.3s;"></div>
        <div style="font-size:9px;color:${i===sendStep?'var(--accent)':'var(--text4)'};transition:color 0.3s;">${s}</div>
      </div>`).join('')}
    </div>
    ${sendStep===0 ? renderSendRecipient() : sendStep===1 ? renderSendAmount() : sendStep===2 ? renderSendProof() : renderSendConfirm()}
  </div>`;
}

function renderSendRecipient() {
  return `<div class="card">
    <div class="input-group">
      <div class="input-label">Recipient Nexus ID</div>
      <input class="input-field" id="send-to" placeholder="e.g. bob.nexus" value="${sendData.to}">
    </div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;">
      ${CONTACTS.filter(c=>c!==persona().id).map(c=>`<button class="btn btn-outline" style="width:auto;padding:6px 12px;font-size:10px;" data-action="pick-contact" data-contact="${c}">${c}</button>`).join('')}
    </div>
    ${sendData.to ? `<div class="callout callout-green">
      <div class="callout-text">\u2713 Resolved stealth meta-address for <strong>${sendData.to}</strong></div>
    </div>
    <div class="hood"><span class="hood-label">UNDER THE HOOD</span><span class="hood-text">Wallet looked up (S, V) from NexusStealthRegistry</span></div>` : ''}
    <button class="btn btn-accent" style="margin-top:12px;" ${sendData.to?'':'disabled'} data-action="send-next">Continue</button>
  </div>`;
}

function renderSendAmount() {
  return `<div class="card">
    <div style="margin-bottom:8px;font-size:11px;color:var(--text2);">Sending to <strong style="color:var(--text)">${sendData.to}</strong></div>
    <div class="input-group">
      <div class="input-label">Amount (USDX)</div>
      <input class="input-field" id="send-amount" type="number" placeholder="0.00" value="${sendData.amount}" style="font-size:22px;font-weight:700;">
    </div>
    <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text3);margin-bottom:4px;">
      <span>Available</span><span style="color:var(--text2)">${usdFmt(persona().balance)} USDX</span>
    </div>
    <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text3);margin-bottom:14px;">
      <span>Network fee</span><span style="color:var(--text2)">~$${(0.08+Math.random()*0.07).toFixed(2)}</span>
    </div>
    <div class="hood"><span class="hood-label">UNDER THE HOOD</span><span class="hood-text">Wallet validates USDX is whitelisted in StealthRouter</span></div>
    <div style="display:flex;gap:8px;margin-top:12px;">
      <button class="btn btn-outline" data-action="send-back">Back</button>
      <button class="btn btn-accent" ${sendData.amount&&parseFloat(sendData.amount)>0?'':'disabled'} data-action="send-next">Continue</button>
    </div>
  </div>`;
}

function renderSendProof() {
  return `<div class="card" id="proof-gen-card">
    <div class="card-title" style="margin-bottom:12px;">Generating ZK Compliance Proof</div>
    <div id="proof-stages"></div>
    <div id="proof-result" style="display:none;"></div>
  </div>`;
}

function animateProofGen() {
  const stages = [
    { text:'Loading zkKYC credential from local vault...', time:500 },
    { text:'Deriving stealth address via ECDH...', time:800 },
    { text:'Generating Groth16 compliance proof...', time:2500 },
    { text:'Proof ready', time:0 },
  ];
  const container = document.getElementById('proof-stages');
  const result = document.getElementById('proof-result');
  if(!container) return;
  let i = 0;
  function showStage() {
    if(i >= stages.length) {
      result.style.display = 'block';
      const ph = mockHash(), th = mockHash(), ih = mockHash();
      result.innerHTML = `<div class="fade-in">
        <div style="text-align:center;margin:12px 0;">
          <div class="badge badge-green" style="font-size:11px;padding:6px 16px;">\u2713 ZK Proof Attached</div>
        </div>
        <div class="proof-card">
          <div style="font-size:11px;font-weight:600;color:var(--green);margin-bottom:8px;">Proof Details</div>
          <div class="proof-row"><span class="proof-key">Type</span><span class="proof-val mono">Groth16 (BN254)</span></div>
          <div class="proof-row"><span class="proof-key">Circuit</span><span class="proof-val">zkKYC Compliance v1</span></div>
          <div class="proof-row"><span class="proof-key">Constraints</span><span class="proof-val">~20,000</span></div>
          <div class="proof-row"><span class="proof-key">Proof size</span><span class="proof-val">192 bytes</span></div>
          <div style="border-top:1px solid var(--surface2);margin:8px 0;"></div>
          <div style="font-size:10px;color:var(--text3);margin-bottom:6px;">Public Signals</div>
          <div class="proof-row"><span class="proof-key">currentTimestamp</span><span class="proof-val mono">${Math.floor(Date.now()/1000)}</span></div>
          <div class="proof-row"><span class="proof-key">issuerPubKeyHash</span><span class="proof-val mono">${truncAddr(ih)}</span></div>
          <div class="proof-row"><span class="proof-key">transferHash</span><span class="proof-val mono">${truncAddr(th)}</span></div>
        </div>
        <div class="callout callout-green">
          <div class="callout-text">\u2713 Sender is zkKYC verified \u2022 sanctions clear \u2022 credential non-expired</div>
        </div>
        <div class="hood"><span class="hood-label">UNDER THE HOOD</span><span class="hood-text">ECDH stealth address derivation + Groth16 zkKYC proof generation</span></div>
        <button class="btn btn-accent" style="margin-top:12px;" data-action="send-next">Continue to Confirm</button>
      </div>`;
      bindEvents();
      return;
    }
    const s = stages[i];
    const done = i > 0;
    container.innerHTML += `<div class="fade-in" style="display:flex;align-items:center;gap:8px;padding:6px 0;">
      <span style="color:${i===stages.length-1&&i===stages.length-1?'var(--green)':'var(--green)'};font-size:10px;">${done||i===stages.length-1?'\u2713':'\u25CB'}</span>
      <span style="font-size:11px;color:${i===stages.length-1?'var(--green)':'var(--text2)'}">${s.text}</span>
    </div>`;
    if(i === 2) {
      container.innerHTML += `<div class="progress-bar"><div class="progress-fill" id="proof-progress" style="width:0%;"></div></div>`;
      let pct = 0;
      const iv = setInterval(()=>{
        pct += 2;
        const bar = document.getElementById('proof-progress');
        if(bar) bar.style.width = Math.min(pct,100)+'%';
        if(pct>=100) clearInterval(iv);
      }, s.time/50);
    }
    i++;
    if(i < stages.length) setTimeout(showStage, stages[i-1].time);
    else setTimeout(showStage, 500);
  }
  showStage();
}

function animateScan() {

  let count = 0;
  const total = 1247;
  const iv = setInterval(()=>{
    count += Math.floor(Math.random()*80)+40;
    if(count > total) count = total;
    const filtered = Math.floor(count * 0.996);
    const ecChecks = count - filtered;
    stats.innerHTML = `<div class="proof-card">
      <div class="proof-row"><span class="proof-key">Announcements scanned</span><span class="proof-val">${count.toLocaleString()}</span></div>
      <div class="proof-row"><span class="proof-key">View tag filtered (99.6%)</span><span class="proof-val" style="color:var(--text3)">${filtered.toLocaleString()} skipped</span></div>

      <div class="proof-row"><span class="proof-key">Matches</span><span class="proof-val" style="color:${count>=total?'var(--green)':'var(--text3)'};">${count>=total?'1':'0'}</span></div>
    </div>`;
    if(count >= total) {
      clearInterval(iv);
      setTimeout(()=>{
        result.style.display = 'block';

function animateVerification(invalid) {
  verifyInvalid = invalid;
  const container = document.getElementById('verify-steps');
  const btn1 = document.getElementById('run-verify-btn');
  const btn2 = document.getElementById('run-invalid-btn');
  if(btn1) btn1.disabled = true;
  if(btn2) btn2.disabled = true;
  if(!container) return;
  container.innerHTML = '';
  const steps = [
    'Fetching proof from transaction calldata...',
    'Checking issuerPubKeyHash against CredentialIssuerRegistry...',
    'Verifying Groth16 pairing equations...',
    'Validating complianceCommitment in ProofRegistry...',
  ];
  const failAt = invalid ? 2 : -1;
  let i = 0;
  function next() {
    if(i >= steps.length) {
      container.innerHTML += `<div class="fade-in verify-step verify-done">
        <div class="verify-icon">\u2713</div>
        <div class="verify-text" style="color:var(--green);font-weight:600;">All checks passed \u2014 transfer is provably compliant</div>
      </div>`;
      // Update the badge
      const badge = document.querySelector('.badge-green, .badge-accent');
      if(badge) { badge.className='badge badge-green'; badge.innerHTML='\u2713 VERIFIED'; }
      if(btn1) btn1.disabled = false;
      if(btn2) btn2.disabled = false;
      return;
    }
    if(i === failAt) {
      container.innerHTML += `<div class="fade-in verify-step verify-fail">
        <div class="verify-icon">\u2717</div>
        <div class="verify-text" style="color:var(--accent);font-weight:600;">\u2717 Groth16 pairing check failed \u2014 proof is invalid or tampered</div>
      </div>`;
      const badge = document.querySelector('.badge-green, .badge-accent');
      if(badge) { badge.className='badge badge-accent'; badge.innerHTML='\u2717 INVALID'; }
      if(btn1) btn1.disabled = false;
      if(btn2) btn2.disabled = false;
      return;
    }
    container.innerHTML += `<div class="fade-in verify-step verify-done">
      <div class="verify-icon">\u2713</div>
      <div class="verify-text">${steps[i]}</div>
    </div>`;
    i++;
    setTimeout(next, 600);
  }
  next();
}

// ── Event Binding ──
function bindEvents() {
  document.querySelectorAll('[data-view]').forEach(el => {
    el.onclick = () => { view = el.dataset.view; sendStep=0; sendData={to:'',amount:''}; recvStep=0; verifyTx=null; verifyInvalid=false; render(); };
  });
  document.querySelectorAll('[data-action]').forEach(el => {
    el.onclick = (e) => {
      e.stopPropagation();
      handleAction(el.dataset.action, el);
    };
  });
  // Live inputs
  const toInput = document.getElementById('send-to');
  if(toInput) toInput.oninput = () => { sendData.to = toInput.value; render(); };
  const amtInput = document.getElementById('send-amount');
  if(amtInput) amtInput.oninput = () => { sendData.amount = amtInput.value; render(); };
}

function handleAction(action, el) {
  switch(action) {
    case 'switch':
      currentPersona = currentPersona === 'alice' ? 'bob' : 'alice';
      render();
      break;
    case 'pick-contact':
      sendData.to = el.dataset.contact;
      render();
      break;
    case 'send-next':
      sendStep++;
      render();
      if(sendStep === 2) setTimeout(animateProofGen, 300);
      break;
    case 'send-back':
      sendStep = Math.max(0, sendStep - 1);
      render();
      break;
    case 'confirm-send':
      animateSendSubmit();
      break;
    case 'send-reset':
      sendStep = 0; sendData = {to:'',amount:''}; render();
      break;
    case 'recv-next':
      recvStep++;
      render();
      if(recvStep === 2) setTimeout(animateSpend, 300);
      break;
    case 'recv-reset':
      recvStep = 0; render();
      break;
    case 'view-tx':
      const txId = el.dataset.txid;
      verifyTx = seedTxs.find(t => t.id === txId) || seedTxs[0];
      verifyInvalid = false;
      view = 'verify';
      render();
      break;
    case 'verify-select':
      const txId2 = el.dataset.txid;
      verifyTx = seedTxs.find(t => t.id === txId2) || seedTxs[0];
      verifyInvalid = false;
      render();
      break;
    case 'verify-back':
      verifyTx = null; verifyInvalid = false; render();
      break;
    case 'run-verify':
      animateVerification(false);
      break;
    case 'run-invalid':
      animateVerification(true);
      break;
  }
}

// ── Init ──
render();
// Watch for receive scan card appearing and auto-start animation
let scanStarted = false;
setInterval(() => {
  const scanCard = document.getElementById('recv-scan-card');
  if(scanCard && view === 'receive' && recvStep === 0 && !scanStarted) {
    scanStarted = true;
    setTimeout(animateScan, 500);
  }
  if(!scanCard || view !== 'receive' || recvStep !== 0) {
    scanStarted = false;
  }
}, 200);
</script>
